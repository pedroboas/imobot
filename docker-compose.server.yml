services:
  # Scraper service: Orchestrates the scraping logic
  scraper:
    build: .
    restart: unless-stopped
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - BROWSER_WS_ENDPOINT=${BROWSER_WS_ENDPOINT}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL}
      - CONCURRENCY_LIMIT=${CONCURRENCY_LIMIT:-2}
    depends_on:
      - imobot_db
      - imobot_browser
    networks:
      - backend
    dns:
      - 8.8.8.8

  # O Browser: Instância isolada
  imobot_browser:
    image: ghcr.io/browserless/chromium:latest
    restart: unless-stopped
    environment:
      - TIMEOUT=120000
      - CONCURRENT=3
      - QUEUED=5
      - HEALTH=true
    networks:
      - backend
    dns:
      - 8.8.8.8

  # A Base de Dados
  imobot_db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: imoveis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  # Dashboard: Monitoring UI
  dashboard:
    build: .
    restart: unless-stopped
    command: python dashboard/app.py
    ports:
      - "8085:8080" # Mapeado para 8085 para não conflituar com o Pi-hole (8080)
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
    depends_on:
      - imobot_db
      - scraper
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
